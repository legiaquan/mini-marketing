syntax = "proto3";

package marketing;

// Đường dẫn mà code Go sẽ được generate ra
option go_package = "mini-marketing/pb";

// Import thư viện của Google để hỗ trợ map gRPC thành HTTP REST API
import "google/api/annotations.proto";

// Import thư viện Validation
import "validate/validate.proto";

// 1. Định nghĩa Data Structure (giống như struct trong Go hoặc class trong Java)
message CampaignRequest {
    string name = 1 [(validate.rules).string = {min_len: 5, max_len: 255}]; // Bắt buộc từ 5-255 ký tự
    string content = 2 [(validate.rules).string.min_len = 1];             // Bắt buộc nhập nội dung
    int32 target_users = 3 [(validate.rules).int32.gt = 0];               // Bắt buộc lớn hơn 0
}

message CampaignResponse {
    string id = 1;
    string status = 2;
    string message = 3;
}

// 2. Định nghĩa Service (gồm các API)
service MarketingService {
    // API tạo Campaign
    rpc CreateCampaign(CampaignRequest) returns (CampaignResponse) {
        // Khai báo để grpc-gateway biết cách biến hàm này thành một HTTP POST
        option (google.api.http) = {
            post: "/v1/campaigns"
            body: "*"
        };
    }
}
